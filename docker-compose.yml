services:
  db:
    image: postgres:18-alpine
    container_name: reserva_db
    volumes:
      - postgres_data:/var/lib/postgresql/
    env_file:
      - .env
    ports:
      - 5434:5432

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build: .
    container_name: go_api
    ports:
      - 3000:3000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
volumes:
  postgres_data:
